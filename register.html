<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - iNurseApp</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5F3XF8G5KN"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5F3XF8G5KN');
    </script>
    
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F9FAFB 0%, #DBEAFE 100%);
            padding: 2rem;
        }
        
        .auth-container {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .auth-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: var(--gray-600);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--gray-300);
        }
        
        .divider span {
            padding: 0 1rem;
            color: var(--gray-500);
            font-size: 0.875rem;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-600);
        }
        
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        
        .password-requirements {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 0.5rem;
        }
        
        .password-requirements ul {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">🩺</div>
                <h1 class="auth-title">Crie sua conta</h1>
                <p class="auth-subtitle">Comece grátis com 100.000 tokens</p>
            </div>

            <div id="alert-container"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="full_name">Nome Completo</label>
                    <input 
                        type="text" 
                        id="full_name" 
                        class="form-input" 
                        placeholder="João da Silva"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">E-mail Profissional</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                        minlength="8"
                    >
                    <div class="password-requirements">
                        Mínimo 8 caracteres, incluindo:
                        <ul>
                            <li>Letra maiúscula</li>
                            <li>Letra minúscula</li>
                            <li>Número</li>
                            <li>Caractere especial (!@#$%)</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password_confirm">Confirmar Senha</label>
                    <input 
                        type="password" 
                        id="password_confirm" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.875rem;">
                        <input type="checkbox" id="terms" required style="margin-top: 0.25rem;">
                        <span>
                            Eu aceito os 
                            <a href="#" style="color: var(--primary);">Termos de Uso</a> 
                            e 
                            <a href="#" style="color: var(--primary);">Política de Privacidade</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                    Criar Conta Grátis
                </button>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <a href="login.html" class="btn btn-secondary btn-block">
                Já tenho uma conta
            </a>

            <div class="auth-footer">
                <a href="index.html">← Voltar para home</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://lively-embrace-production-a4a2.up.railway.app';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            const alertContainer = document.getElementById('alert-container');
            
            // Limpar alertas anteriores
            alertContainer.innerHTML = '';
            
            // Validar senhas
            const password = document.getElementById('password').value;
            const password_confirm = document.getElementById('password_confirm').value;
            
            if (password !== password_confirm) {
                alertContainer.innerHTML = `
                    <div class="alert alert-error">
                        ❌ As senhas não coincidem
                    </div>
                `;
                return;
            }
            
            // Desabilitar botão
            btn.disabled = true;
            btn.textContent = 'Criando conta...';
            
            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            
            try {
                const response = await fetch(API_BASE_URL + '/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        password_confirm,
                        full_name
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Mostrar sucesso
                    alertContainer.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Conta criada com sucesso! Redirecionando para login...
                        </div>
                    `;
                    
                    // Redirecionar para login
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.detail || 'Erro ao criar conta');
                }
            } catch (error) {
                alertContainer.innerHTML = `
                    <div class="alert alert-error">
                        ❌ ${error.message}
                    </div>
                `;
                
                btn.disabled = false;
                btn.textContent = 'Criar Conta Grátis';
            }
        });
    </script>
</body>
</html>
