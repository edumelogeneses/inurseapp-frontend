<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- META TAGS - SEO & Social Media -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Login - iNurseApp | Acesse sua Conta</title>
    <meta name="description" content="Faça login no iNurseApp e transforme áudios em prontuários SOAP com IA em segundos.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563EB">
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iNurseApp">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5F3XF8G5KN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5F3XF8G5KN');
    </script>
    
    <link rel="canonical" href="https://inurseapp.com/login.html">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://lively-embrace-production-a4a2.up.railway.app">
    
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F9FAFB 0%, #DBEAFE 100%);
            padding: 2rem;
        }
        
        .auth-container {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .auth-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: var(--gray-600);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--gray-300);
        }
        
        .divider span {
            padding: 0 1rem;
            color: var(--gray-500);
            font-size: 0.875rem;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-600);
        }
        
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }
        
        .forgot-password a {
            color: var(--primary);
            font-size: 0.875rem;
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="sr-only">Pular para conteúdo principal</a>
    
    <main id="main-content" class="auth-page">
        <div class="auth-container">
            <header class="auth-header">
                <div class="auth-logo" role="img" aria-label="Logo iNurseApp">🩺</div>
                <h1 class="auth-title">Bem-vindo de volta</h1>
                <p class="auth-subtitle">Faça login para continuar</p>
            </header>

            <div id="alert-container" role="alert" aria-live="polite" aria-atomic="true"></div>

            <form id="loginForm" novalidate aria-label="Formulário de login">
                <div class="form-group">
                    <label class="form-label" for="email">
                        E-mail
                        <span class="sr-only">(obrigatório)</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        class="form-input" 
                        placeholder="seu@email.com"
                        required
                        autocomplete="email"
                        autofocus
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        Senha
                        <span class="sr-only">(obrigatório)</span>
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        class="form-input" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        aria-required="true"
                    >
                    <div class="forgot-password">
                        <a href="forgot-password.html">Esqueceu a senha?</a>
                    </div>
                </div>

                <div class="remember-me">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember"
                    >
                    <label for="remember">Manter-me conectado</label>
                </div>

                <button 
                    type="submit" 
                    class="btn btn-primary btn-block" 
                    id="loginBtn"
                    style="margin-top: 1.5rem;"
                    aria-label="Fazer login"
                >
                    Entrar
                </button>
            </form>

            <div class="divider" role="separator">
                <span>ou</span>
            </div>

            <a 
                href="register.html" 
                class="btn btn-secondary btn-block"
                aria-label="Criar uma nova conta"
            >
                Criar uma conta
            </a>

            <footer class="auth-footer">
                <a href="index.html" aria-label="Voltar para página inicial">← Voltar para o site</a>
            </footer>
        </div>
    </main>

    <!-- Configuração de Ambiente (DEVE vir primeiro) -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        // Redirect if already authenticated
        redirectIfAuthenticated();
        
        // Show login message if exists
        const loginMessage = sessionStorage.getItem('login_message');
        if (loginMessage) {
            const alertContainer = document.getElementById('alert-container');
            showAlert(alertContainer, loginMessage, 'error');
            sessionStorage.removeItem('login_message');
        }
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const alertContainer = document.getElementById('alert-container');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Disable button
            btn.disabled = true;
            btn.textContent = 'Entrando...';
            btn.setAttribute('aria-busy', 'true');
            
            try {
                const result = await login(email, password, remember);
                
                if (result.success) {
                    showAlert(alertContainer, 'Login realizado! Redirecionando...', 'success');
                    
                    setTimeout(() => {
                        const redirect = sessionStorage.getItem('redirect_after_login');
                        sessionStorage.removeItem('redirect_after_login');
                        window.location.href = redirect || 'dashboard.html';
                    }, 1000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showAlert(alertContainer, error.message, 'error');
                
                btn.disabled = false;
                btn.textContent = 'Entrar';
                btn.setAttribute('aria-busy', 'false');
            }
        });
    </script>
</body>
</html>
