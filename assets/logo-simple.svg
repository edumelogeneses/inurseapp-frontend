<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#2563EB"/>
  
  <!-- Simple Stethoscope + Heart -->
  <g transform="translate(256, 256)">
    <!-- Heart shape -->
    <path d="M0 50 C-50 -20, -150 -20, -150 50 C-150 120, 0 200, 0 200 C0 200, 150 120, 150 50 C150 -20, 50 -20, 0 50 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- Medical Plus -->
    <g transform="translate(0, -20)">
      <rect x="-10" y="-40" width="20" height="80" rx="5" fill="#2563EB"/>
      <rect x="-40" y="-10" width="80" height="20" rx="5" fill="#2563EB"/>
    </g>
  </g>
</svg>
