<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNurseApp - Icon Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1f2937;
            font-size: 2.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 3rem;
        }
        
        .section {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .section h2 {
            margin-bottom: 1.5rem;
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            padding-bottom: 0.5rem;
        }
        
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        
        .icon-item {
            background: #f9fafb;
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
            border: 2px solid #e5e7eb;
            transition: all 0.2s;
        }
        
        .icon-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
            border-color: #2563eb;
        }
        
        .icon-item img {
            max-width: 100%;
            height: auto;
            margin-bottom: 0.5rem;
        }
        
        .icon-item p {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.25rem;
        }
        
        .icon-item .size {
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .instructions {
            background: #eff6ff;
            border-left: 4px solid #2563eb;
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .instructions h3 {
            color: #1e40af;
            margin-bottom: 0.5rem;
        }
        
        .instructions code {
            background: #1e293b;
            color: #10b981;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 iNurseApp</h1>
        <p class="subtitle">Preview de Ícones PWA</p>
        
        <!-- PWA Icons -->
        <div class="section">
            <h2>📱 Ícones PWA (Progressive Web App)</h2>
            <div class="icon-grid" id="pwa-icons">
                <!-- Será preenchido por JavaScript -->
            </div>
        </div>
        
        <!-- Favicons -->
        <div class="section">
            <h2>🌐 Favicons</h2>
            <div class="icon-grid" id="favicons">
                <!-- Será preenchido por JavaScript -->
            </div>
        </div>
        
        <!-- Instructions -->
        <div class="instructions">
            <h3>📝 Como gerar os ícones</h3>
            <p><strong>Opção 1 (Mais fácil):</strong> Use o PWA Builder</p>
            <p>→ Acesse: <a href="https://www.pwabuilder.com/imageGenerator" target="_blank">https://www.pwabuilder.com/imageGenerator</a></p>
            <br>
            <p><strong>Opção 2 (Linha de comando):</strong></p>
            <p>→ Execute: <code>.\generate-icons.ps1</code></p>
        </div>
    </div>

    <script>
        // PWA Icons
        const pwaIcons = [
            { size: 72, use: 'Android launcher (ldpi)' },
            { size: 96, use: 'Android launcher (mdpi)' },
            { size: 128, use: 'Chrome Web Store' },
            { size: 144, use: 'Windows tile' },
            { size: 152, use: 'iPad touch icon' },
            { size: 192, use: 'Android launcher (xxxhdpi)' },
            { size: 384, use: 'Android splash' },
            { size: 512, use: 'PWA install prompt' }
        ];
        
        // Favicons
        const favicons = [
            { path: 'favicon-16x16.png', name: 'Favicon 16x16', use: 'Browser tab' },
            { path: 'favicon-32x32.png', name: 'Favicon 32x32', use: 'Browser tab (retina)' },
            { path: 'apple-touch-icon.png', name: 'Apple Touch Icon', use: 'iOS home screen' },
            { path: 'favicon.ico', name: 'Favicon ICO', use: 'Legacy browsers' }
        ];
        
        // Render PWA icons
        const pwaGrid = document.getElementById('pwa-icons');
        pwaIcons.forEach(icon => {
            const path = `assets/icons/icon-${icon.size}x${icon.size}.png`;
            const item = document.createElement('div');
            item.className = 'icon-item';
            
            const img = document.createElement('img');
            img.src = path;
            img.alt = `Icon ${icon.size}x${icon.size}`;
            img.onerror = () => {
                item.innerHTML = `
                    <p>icon-${icon.size}x${icon.size}.png</p>
                    <p class="size">${icon.use}</p>
                    <span class="status error">Não gerado</span>
                `;
            };
            img.onload = () => {
                item.innerHTML = '';
                item.appendChild(img);
                item.innerHTML += `
                    <p>icon-${icon.size}x${icon.size}.png</p>
                    <p class="size">${icon.use}</p>
                    <span class="status success">✓ Gerado</span>
                `;
            };
            
            item.appendChild(img);
            pwaGrid.appendChild(item);
        });
        
        // Render favicons
        const faviconGrid = document.getElementById('favicons');
        favicons.forEach(favicon => {
            const item = document.createElement('div');
            item.className = 'icon-item';
            
            const img = document.createElement('img');
            img.src = favicon.path;
            img.alt = favicon.name;
            img.onerror = () => {
                item.innerHTML = `
                    <p>${favicon.name}</p>
                    <p class="size">${favicon.use}</p>
                    <span class="status error">Não gerado</span>
                `;
            };
            img.onload = () => {
                item.innerHTML = '';
                item.appendChild(img);
                item.innerHTML += `
                    <p>${favicon.name}</p>
                    <p class="size">${favicon.use}</p>
                    <span class="status success">✓ Gerado</span>
                `;
            };
            
            item.appendChild(img);
            faviconGrid.appendChild(item);
        });
    </script>
</body>
</html>
